# TRMNLP configuration
# {{ env.VARIABLE }} interpolation is available here
---
watch:
  - .trmnlp.yml
  - src

custom_fields: {}

variables:
  trmnl:
    system:
      timestamp_utc: 1700000000
    plugin_settings:
      instance_name: "iNaturalist"
      strategy: polling
      dark_mode: "no"
      no_screen_padding: "yes"
      custom_fields_values:
        taxon: "Aves"
        use_location: "false"
        lat: ""
        lng: ""
        units: "metric"
        radius: "50"
        feed: "popular"
        mode: "sequential"
        overlay_fields: '["species","scientific","location","observer","license"]'
  items:
    - photo_url: "https://inaturalist-open-data.s3.amazonaws.com/photos/336879148/large.jpeg"
      species: "Common Blackbird"
      scientific: "Turdus merula"
      iconic: "Aves"
      location: "Amsterdam, Netherlands"
      observed_on: "2024-01-15"
      observer: "naturalist_jane"
      license: "CC BY-NC"
    - photo_url: "https://inaturalist-open-data.s3.amazonaws.com/photos/336879148/large.jpeg"
      species: "King Penguin"
      scientific: "Aptenodytes patagonicus"
      iconic: "Aves"
      location: "South Georgia"
      observed_on: "2024-02-03"
      observer: "seabird_watcher"
      license: "CC BY"
    - photo_url: "https://inaturalist-open-data.s3.amazonaws.com/photos/336879148/large.jpeg"
      species: "Fly Agaric"
      scientific: "Amanita muscaria"
      iconic: "Fungi"
      location: "Ardennes, Belgium"
      observed_on: "2024-10-12"
      observer: "fungal_fan"
      license: "CC BY-NC-SA"
    - photo_url: "https://inaturalist-open-data.s3.amazonaws.com/photos/336879148/large.jpeg"
      species: "Monarch Butterfly"
      scientific: "Danaus plexippus"
      iconic: "Insecta"
      location: "California, USA"
      observed_on: "2024-09-28"
      observer: "butterfly_chaser"
      license: "CC BY"
  total_count: 997
  error: null
