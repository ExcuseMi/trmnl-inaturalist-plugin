---
strategy: polling
no_screen_padding: 'yes'
dark_mode: 'no'
static_data: ''
polling_verb: post
framework_version: 2.3.7
serverless_language: ''
polling_url: https://trmnl.bettens.dev/inaturalist/observation
polling_headers: 'Content-Type: application/json'
polling_body: '{"taxon":{{ trmnl.plugin_settings.custom_fields_values.taxon | default: [] | json }},"locale":"{{ trmnl.user.locale | default: "en" }}"}'
id: 290545
custom_fields:
- keyname: author_info
  name: About This Plugin
  field_type: author_bio
  description: Wake up to a polar bear. A mantis shrimp. A mushroom that shouldn't exist.<br /><br />Every day this plugin pulls the <strong>most-loved wildlife photos</strong> from iNaturalist — real observations, real places, real people who stopped to look.<br /><br />Filter by birds, mammals, fungi, or any group you love.
  github_url: https://github.com/ExcuseMi/trmnl-inaturalist-plugin
  learn_more_url: https://www.inaturalist.org
  category: nature,images
  help_text: TRMNL X Ready
- keyname: taxon
  field_type: select
  multiple: true
  name: Categories
  description: Filter by one or more groups. Leave empty to see all wildlife.
  help_text: Use <kbd>⌘</kbd>+<kbd>click</kbd> or <kbd>ctrl</kbd>+<kbd>click</kbd> to select and deselect multiple options.
  options:
  - "Birds — eagles, penguins, songbirds": Aves
  - "Mammals — whales, primates, big cats": Mammalia
  - "Insects — butterflies, beetles, bees": Insecta
  - "Plants — wildflowers, trees, cacti": Plantae
  - "Fungi — mushrooms, lichens, molds": Fungi
  - "Reptiles — snakes, lizards, turtles": Reptilia
  - "Amphibians — frogs, salamanders, newts": Amphibia
  - "Fish — reef fish, sharks, rays": Actinopterygii
  - "Spiders & Arachnids — spiders, scorpions": Arachnida
  - "Mollusks — octopus, snails, slugs": Mollusca
  optional: true
- keyname: show_qr
  field_type: boolean
  name: Show QR Code
  description: Overlay a scannable QR code so you can look up the observation on your phone.
  default: 'false'
  optional: true
name: iNaturalist Nature Observations
refresh_interval: 60
