---
strategy: polling
no_screen_padding: 'yes'
dark_mode: 'no'
static_data: ''
polling_verb: post
framework_version: 2.3.7
serverless_language: ''
polling_url: https://trmnl.bettens.dev/inaturalist/observation
polling_headers: 'Content-Type: application/json'
polling_body: '{"plugin_setting_id":"{{ trmnl.plugin_settings.id }}","taxon":{{ trmnl.plugin_settings.custom_fields_values.taxon | default: "[]" }}}'
id: 290545
custom_fields:
- keyname: author_info
  name: About This Plugin
  field_type: author_bio
  description: Show research-grade wildlife observations from iNaturalist on your TRMNL display. A fresh batch of the most popular observations is fetched daily and shown randomly on your device.<br><br>No iNaturalist account required — all data is public.
  github_url: https://github.com/ExcuseMi/trmnl-inaturalist-plugin
  category: nature,images
  help_text: TRMNL X Ready
- keyname: taxon
  field_type: select
  multiple: true
  name: Categories
  description: Filter by one or more groups. Leave empty to see all wildlife.
  help_text: Use <kbd>⌘</kbd>+<kbd>click</kbd> or <kbd>ctrl</kbd>+<kbd>click</kbd> to select and deselect multiple options.
  options:
  - Birds: Aves
  - Mammals: Mammalia
  - Insects: Insecta
  - Plants: Plantae
  - Fungi: Fungi
  - Reptiles: Reptilia
  - Amphibians: Amphibia
  - Fish: Actinopterygii
  - Spiders & Arachnids: Arachnida
  - Mollusks: Mollusca
  optional: true
- keyname: show_qr
  field_type: boolean
  name: Show QR Code
  description: Overlay a scannable QR code so you can look up the observation on your phone.
  default: 'false'
  optional: true
name: iNaturalist
refresh_interval: 60
