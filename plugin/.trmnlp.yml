# TRMNLP configuration
---
watch:
  - .trmnlp.yml
  - src

custom_fields: {}

variables:
  trmnl:
    system:
      timestamp_utc: 1700000000
    plugin_settings:
      id: preview-001
      instance_name: "iNaturalist"
      strategy: polling
      dark_mode: "no"
      no_screen_padding: "yes"
      custom_fields_values:
        taxon: "Aves"
        use_location: "false"
        lat: ""
        lng: ""
        units: "metric"
        radius: "50"
        show_qr: "false"
  items:
