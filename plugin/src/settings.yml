---
strategy: polling
no_screen_padding: 'yes'
dark_mode: 'no'
static_data: ''
polling_verb: post
framework_version: 2.3.7
polling_url: "https://trmnl.bettens.dev/inaturalist/observation"
polling_headers: 'Content-Type: application/json'
polling_body: '{"plugin_setting_id":"{{ trmnl.plugin_settings.id }}","taxon":"{{ trmnl.plugin_settings.custom_fields_values.taxon }}","use_location":"{{ trmnl.plugin_settings.custom_fields_values.use_location }}","lat":"{{ trmnl.plugin_settings.custom_fields_values.lat }}","lng":"{{ trmnl.plugin_settings.custom_fields_values.lng }}","radius":{{ trmnl.plugin_settings.custom_fields_values.radius | default: 50 }},"units":"{{ trmnl.plugin_settings.custom_fields_values.units | default: "metric" }}"}'
custom_fields:
- keyname: author_info
  name: About This Plugin
  field_type: author_bio
  description: Show research-grade wildlife observations from iNaturalist on your TRMNL display. A fresh batch of the most popular observations is fetched daily and shown randomly on your device.<br><br>No iNaturalist account required — all data is public.
  github_url: https://github.com/ExcuseMi/trmnl-inaturalist-plugin
  category: nature,images
  help_text: TRMNL X Ready
- keyname: taxon
  field_type: select
  name: Category
  description: Filter observations by broad taxonomic group. Leave as "All" to see everything.
  options:
  - All: ''
  - Birds: Aves
  - Mammals: Mammalia
  - Insects: Insecta
  - Plants: Plantae
  - Fungi: Fungi
  - Reptiles: Reptilia
  - Amphibians: Amphibia
  - Fish: Actinopterygii
  - Spiders & Arachnids: Arachnida
  - Mollusks: Mollusca
  default: ''
  optional: true
- keyname: use_location
  field_type: boolean
  name: Filter by Location
  description: Only show observations near a specific location. Requires Latitude and Longitude below.
  default: 'false'
  optional: true
  conditional_validation:
    - when: 'false'
      hidden: [lat, lng, units, radius]
- keyname: lat
  field_type: string
  name: Latitude
  description: Decimal latitude of the center point (e.g. 51.5074 for London).
  placeholder: '51.5074'
  optional: true
- keyname: lng
  field_type: string
  name: Longitude
  description: Decimal longitude of the center point (e.g. -0.1278 for London).
  placeholder: '-0.1278'
  optional: true
- keyname: units
  field_type: select
  name: Units
  description: Unit system for the search radius.
  options:
  - Metric (km): metric
  - Imperial (miles): imperial
  default: metric
  optional: true
- keyname: radius
  field_type: select
  name: Search Radius
  description: How far from your location to search. Value is in km or miles depending on the Units setting above.
  options:
  - '10': 10
  - '25': 25
  - '50': 50
  - '100': 100
  - '250': 250
  default: 50
  optional: true
- keyname: show_qr
  field_type: boolean
  name: Show QR Code
  description: Overlay a scannable QR code so you can look up the observation on your phone.
  default: 'false'
  optional: true

name: iNaturalist
refresh_interval: 60
